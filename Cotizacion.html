<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cotizar Productos | Grupo Buissa - Suministros Industriales</title>
    <meta name="description" content="Solicita tu cotización de cartón, sogas y guantes industriales. Respuesta inmediata vía WhatsApp.">
    <link rel="stylesheet" href="Stile.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

<header class="main-header">
    <div class="nav-container">
        <a href="index.html" class="logo-box">
            <img src="assets/logo.png" alt="Grupo Buissa Logo" class="logo-img">
        </a>
        <nav class="nav-menu">
            <ul>
                <li><a href="index.html">Inicio</a></li>
                <li><a href="Cotizacion.html" class="active">Productos</a></li>
                <li><a href="Cotizacion.html" class="btn-nav">WhatsApp</a></li>
            </ul>
        </nav>
    </div>
</header>

<main class="container">
    <section class="form-section">
        <div class="form-header">
            <h1>Cotización de Productos</h1>
            <p>Selecciona los suministros que necesitas y recibe el presupuesto en tu WhatsApp.</p>
        </div>

        <form id="dynamicForm" class="quote-form">
            <div class="form-group">
                <label for="nombre">Nombre Completo</label>
                <input type="text" id="nombre" name="nombre" placeholder="Ej. Juan Pérez" required>
            </div>

            <div class="form-group">
                <label for="email">Correo Electrónico</label>
                <input type="email" id="email" name="email" placeholder="correo@ejemplo.com" required>
            </div>

            <div id="productosContainer" class="products-list">
                <label>Productos a Cotizar</label>
                <div class="producto-row">
                    <select name="producto[]" required>
                        <option value="" disabled selected>Elegir producto...</option>
                        <option value="Cartón Corrugado">Cartón Corrugado</option>
                        <option value="Soga Polipropileno">Soga Polipropileno</option>
                        <option value="Guantes de Nitrilo">Guantes de Nitrilo</option>
                        <option value="Cinta de Embalaje">Cinta de Embalaje</option>
                    </select>
                    <input type="number" name="cantidad[]" placeholder="Cant." min="1" required>
                </div>
            </div>

            <button type="button" id="addProduct" class="btn-secondary">+ Agregar otro producto</button>

            <div class="form-group margin-top">
                <label for="mensaje">Notas adicionales (Medidas, color, etc.)</label>
                <textarea id="mensaje" name="mensaje" rows="4" placeholder="Escribe aquí los detalles..."></textarea>
            </div>

            <input type="hidden" name="origen" value="Web_Cotizacion">
            <button type="submit" class="btn-submit">Enviar Cotización por WhatsApp</button>
        </form>
    </section>
</main>

<footer class="footer-simple">
    <p>&copy; 2026 Grupo Buissa | Cali, Colombia</p>
</footer>

<script src="cotizacion.js"></script>
</body>
</html>
