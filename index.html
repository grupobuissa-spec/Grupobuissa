<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grupo Buissa | Inicio</title>
  <link rel="stylesheet" href="Stile.css">
</head>
<body>

  <header class="main-header">
    <div class="container header-container">
      <a href="index.html">
        <img src="assets/logo.png" alt="Logo" class="logo">
      </a>
      <nav class="main-nav">
        <ul class="menu">
          <li><a href="index.html" class="active">Inicio</a></li>
          <li><a href="Cotizacion.html">Cotización</a></li>
          <li><a href="#contacto">Contacto</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <main>
    <section class="slider-container">
      <div class="slider-track" id="sliderTrack">
        <article class="banner active">
          <img src="assets/banner-aliado.png" alt="Alianza" class="banner-img">
          <div class="banner-content">
            <h1>Tu aliado estratégico</h1>
            <p>Confianza y resultados para tu negocio.</p>
            <a href="Cotizacion.html" class="btn btn-primary">Cotizar ahora</a>
          </div>
        </article>
        </div>
      
      <button class="slider-control prev" id="prevBtn">❮</button>
      <button class="slider-control next" id="nextBtn">❯</button>
      
      <div class="dots-container" id="dotsContainer">
        <button class="dot active" data-index="0"></button>
        <button class="dot" data-index="1"></button>
        <button class="dot" data-index="2"></button>
      </div>
    </section>
  </main>

  <footer class="main-footer" id="contacto">
    <div class="container">
      <p>© 2026 Grupo Buissa | Cali, Colombia</p>
    </div>
  </footer>

  <script src="script.js"></script>
</body>
</html>
