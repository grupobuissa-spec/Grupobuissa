<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Slider de Banners</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="slider-container">
    <div class="slider">
      <section class="banner active">
        <img src="assets/banner-aliado.png" alt="Tu aliado en cada decisión" class="banner-img">
        <div class="banner-text">
          <h1>Tu aliado en cada decisión</h1>
          <p>Confianza y cercanía para tu negocio</p>
          <a href="cotizacion.html" class="btn">Solicita tu cotización</a>
        </div>
      </section>

      <section class="banner">
        <img src="assets/banner-soluciones.png" alt="Soluciones a tu medida" class="banner-img">
        <div class="banner-text">
          <h1>Soluciones a tu medida</h1>
          <p>Nos adaptamos a tus necesidades</p>
          <a href="cotizacion.html" class="btn">Habla con un asesor</a>
        </div>
      </section>

      <section class="banner">
        <img src="assets/banner.png" alt="Asesoría y confianza" class="banner-img">
        <div class="banner-text">
          <h1>Asesoría y confianza</h1>
          <p>Apoyo y compromiso en cada paso</p>
          <a href="cotizacion.html" class="btn">Solicita tu consulta</a>
        </div>
      </section> 
    </div>

    <button class="prev" onclick="prevSlide()">&#10094;</button>
    <button class="next" onclick="nextSlide()">&#10095;</button>

    <div class="dots-container">
      <span class="dot active" onclick="currentSlide(1)"></span>
      <span class="dot" onclick="currentSlide(2)"></span>
      <span class="dot" onclick="currentSlide(3)"></span>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
